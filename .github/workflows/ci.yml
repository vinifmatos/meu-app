name: CI - Testes Automáticos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend (Rails)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meu_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.6'
          bundler-cache: true
          working-directory: backend

      - name: Instalar Gems
        run: bundle install
        working-directory: backend

      - name: Configurar Banco de Dados
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: |
          bundle exec rails db:prepare

      - name: Rodar RSpec
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: bundle exec rspec

  frontend-tests:
    name: Frontend (Build & E2E)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meu_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.6'
          bundler-cache: true
          working-directory: backend

      - name: Instalar Gems (Backend)
        working-directory: backend
        run: bundle install

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.8.0'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Instalar Dependências (Frontend)
        working-directory: frontend
        run: yarn install

      - name: Rodar Build (Frontend)
        working-directory: frontend
        run: yarn ng build --progress=false

      - name: Instalar Navegadores Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Preparar Banco de Dados (Backend)
        working-directory: backend
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: bundle exec rails db:prepare

      - name: Rodar Testes E2E
        working-directory: frontend
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: yarn e2e

      - name: Upload de Artefatos Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
