name: CI - Testes Automáticos & Preview

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  backend-tests:
    name: Backend (Rails)
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meu_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Instalar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: true
          working-directory: backend

      - name: Instalar Gems
        run: bundle install
        working-directory: backend

      - name: Configurar Banco de Dados
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: |
          bundle exec rails db:prepare

      - name: Rodar RSpec
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: bundle exec rspec

  frontend-tests:
    name: Frontend (Build & E2E)
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: meu_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Instalar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: true
          working-directory: backend

      - name: Instalar Gems (Backend)
        working-directory: backend
        run: bundle install

      - name: Instalar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.8.0"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Instalar Dependências (Frontend)
        working-directory: frontend
        run: yarn install

      - name: Rodar Build (Frontend)
        working-directory: frontend
        run: yarn ng build --progress=false

      - name: Instalar Navegadores Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Preparar Banco de Dados (Backend)
        working-directory: backend
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: bundle exec rails db:prepare

      - name: Rodar Testes E2E
        working-directory: frontend
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/meu_app_test
        run: yarn e2e

      - name: Upload de Artefatos Playwright
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  preview:
    name: Ambiente de Preview
    runs-on: ubuntu-latest
    # Só executa se:
    # 1. A PR foi fechada (para limpeza)
    # 2. OU Se os testes passaram (sucesso do backend e frontend)
    if: |
      always() && 
      github.event_name == 'pull_request' && 
      (github.event.action == 'closed' || (needs.backend-tests.result == 'success' && needs.frontend-tests.result == 'success'))
    needs: [backend-tests, frontend-tests]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_KEY }}
          script: |
            export PR_NUMBER=${{ github.event.pull_request.number }}
            export BRANCH=${{ github.head_ref }}
            export PR_ACTION=${{ github.event.action }}
            export DEPLOY_TOKEN=${{ secrets.DEPLOY_TOKEN }}

            echo "Deploying preview PR-${PR_NUMBER}"

            cd /opt/app

            if [ "$PR_ACTION" = "closed" ]; then
              echo "Removing preview PR-${PR_NUMBER}"

              docker compose \
                -f pr-${PR_NUMBER}/docker-compose.staging.yml \
                --project-name pr-${PR_NUMBER} \
                down -v
              rm -rf pr-${PR_NUMBER}
              exit 0
            fi

            # Clonar ou atualizar repositório
            if [ ! -d "pr-${PR_NUMBER}" ]; then
              git clone https://$DEPLOY_TOKEN@github.com/vinifmatos/meu-app.git pr-${PR_NUMBER}
            fi

            cd pr-${PR_NUMBER}
            git fetch origin
            git checkout ${BRANCH}
            git pull origin ${BRANCH}

            docker compose -f docker-compose.staging.yml \
              --project-name pr-${PR_NUMBER} down
            docker compose -f docker-compose.staging.yml \
              --project-name pr-${PR_NUMBER} up -d --build
