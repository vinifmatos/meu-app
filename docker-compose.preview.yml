version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always
    env_file:
      - /opt/app/configs/.env.preview
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.preview
      args:
        APP_MAJOR_VERSION: ${APP_MAJOR_VERSION:-0}
        APP_MINOR_VERSION: ${APP_MINOR_VERSION:-1}
        APP_PATCH_VERSION: ${APP_PATCH_VERSION:-0}
    restart: always
    depends_on:
      - postgres
    env_file:
      - /opt/app/configs/.env.preview
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/app_pr_${PR_NUMBER}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-${PR_NUMBER}.rule=Host(`${$DOMAIN_NAME}`) && PathPrefix(`/pr-${PR_NUMBER}/api`)"
      - "traefik.http.routers.api-${PR_NUMBER}.entrypoints=websecure"
      - "traefik.http.routers.api-${PR_NUMBER}.tls.certresolver=le"
      - "traefik.http.services.api-${PR_NUMBER}.loadbalancer.server.port=3000"
    networks:
      - postgres
      - proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.preview
      args:
        PR_PATH: pr-${PR_NUMBER}
    restart: always
    env_file:
      - /opt/app/configs/.env.preview
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.front-${PR_NUMBER}.rule=Host(`${$DOMAIN_NAME}`) && PathPrefix(`/pr-${PR_NUMBER}`)"
      - "traefik.http.routers.front-${PR_NUMBER}.entrypoints=websecure"
      - "traefik.http.routers.front-${PR_NUMBER}.tls.certresolver=le"
      - "traefik.http.routers.front-${PR_NUMBER}.middlewares=front-${PR_NUMBER}-strip"
      - "traefik.http.middlewares.front-${PR_NUMBER}-strip.stripprefix.prefixes=/pr-${PR_NUMBER}"
      - "traefik.http.services.front-${PR_NUMBER}.loadbalancer.server.port=80"
    networks:
      - proxy

volumes:
  pgdata:

networks:
  postgres:
  proxy:
    external: true
