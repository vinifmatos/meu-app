<div class="card p-4">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Gerenciamento de Usuários</h2>
    <p-button label="Novo Usuário" icon="pi pi-plus" (click)="abrirDialogo()"></p-button>
  </div>

  <p-table [value]="usuarios" [paginator]="true" [rows]="10" responsiveLayout="scroll" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Usuário</th>
        <th>Perfil</th>
        <th>Data de Criação</th>
        <th class="w-32">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-usuario>
      <tr>
        <td>{{ usuario.id }}</td>
        <td>{{ usuario.nome }}</td>
        <td>{{ usuario.username }}</td>
        <td>{{ usuario.role }}</td>
        <td>{{ usuario.createdAt | date: 'short' }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (click)="abrirDialogo(usuario)"></p-button>
            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (click)="excluirUsuario($event, usuario)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-8">Nenhum usuário encontrado.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmpopup></p-confirmpopup>
