<h1 class="text-2xl font-bold mb-2">Usuários</h1>

<div class="mb-2">
  <button pButton type="button" label="Adicionar Usuário" (click)="openDialog()" icon=" pi pi-plus"></button>
</div>

<p-table [value]="usuarios" [tableStyle]="{ 'min-width': '50rem' }">
  <ng-template #header>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Role</th>
      <th></th>
    </tr>
  </ng-template>
  <ng-template #body let-usuario>
    <tr>
      <td>{{ usuario.id }}</td>
      <td>{{ usuario.username }}</td>
      <td>{{ usuario.role }}</td>
      <td>
        <div class="flex justify-center gap-2">
          <button pButton type="button" icon="pi pi-pencil" text (click)="openDialog()"></button>
          <button pButton type=" button" icon="pi pi-trash" text severity="danger"></button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
