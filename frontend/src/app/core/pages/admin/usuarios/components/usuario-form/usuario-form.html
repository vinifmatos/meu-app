<form class="mb-6" [formGroup]="form">
  <div class="flex flex-col w-full gap-6">
    <div class="form-field">
      <label for="username">Username</label>
      <input pInputText id="username" type="text" formControlName="username" />
    </div>
  </div>
</form>

<div class="flex justify-end gap-2">
  <p-button type="button" label="Cancelar" (click)="close()" icon="pi pi-check" severity="secondary" />
  <p-button type="button" label="Salvar" (click)="save()" icon="pi pi-check" />
</div>
